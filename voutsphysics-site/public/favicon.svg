<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#14233F"/>
  <!-- Newton's cradle frame -->
  <g stroke="#2C5B8A" stroke-width="2.4" stroke-linecap="round" fill="none">
    <path d="M14 14 H50"/>
    <line x1="16" y1="14" x2="16" y2="38"/>
    <line x1="24" y1="14" x2="24" y2="38"/>
    <line x1="32" y1="14" x2="32" y2="38"/>
    <line x1="40" y1="14" x2="40" y2="38"/>
    <!-- swung-out ball string -->
    <line x1="48" y1="14" x2="56" y2="38"/>
  </g>
  <!-- balls -->
  <g fill="#2C7CC2">
    <circle cx="16" cy="42" r="4.2"/>
    <circle cx="24" cy="42" r="4.2"/>
    <circle cx="32" cy="42" r="4.2"/>
    <circle cx="40" cy="42" r="4.2"/>
    <circle cx="56" cy="42" r="4.2"/>
  </g>
</svg>
